<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>流畅版炫酷心动代码</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: #fff;
      background: radial-gradient(circle at 20% 20%, #1b2aff 0%, transparent 28%),
                  radial-gradient(circle at 80% 30%, #ff2bd6 0%, transparent 28%),
                  radial-gradient(circle at 50% 90%, #00e5ff 0%, transparent 34%),
                  linear-gradient(135deg, #050816 0%, #090b22 55%, #12051f 100%);
    }
    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
    }
    .aurora {
      position: absolute;
      inset: -20%;
      background: conic-gradient(from 90deg, rgba(0,229,255,.18), rgba(255,43,214,.15), rgba(255,72,114,.14), rgba(0,229,255,.18));
      filter: blur(50px);
      opacity: .72;
      animation: spin 18s linear infinite;
      z-index: -3;
    }
    .grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255,255,255,.055) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.055) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 72%);
      z-index: -2;
    }
    .card {
      position: relative;
      width: min(88vw, 760px);
      min-height: 560px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 34px;
      background: rgba(255,255,255,.07);
      box-shadow: 0 30px 80px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.16);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 42px 24px;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      background: linear-gradient(120deg, transparent 0%, rgba(0,229,255,.35) 28%, rgba(255,43,214,.35) 55%, transparent 82%);
      opacity: .45;
      z-index: -1;
    }
    canvas {
      width: min(74vw, 520px);
      height: min(74vw, 520px);
      max-height: 520px;
      display: block;
    }
    .title {
      margin-top: -26px;
      font-size: clamp(34px, 7vw, 62px);
      font-weight: 900;
      letter-spacing: .08em;
      text-align: center;
      text-shadow: 0 0 18px rgba(255,43,214,.55), 0 0 34px rgba(0,229,255,.36);
      animation: breathe 2.2s ease-in-out infinite;
    }
    .subtitle {
      margin-top: 16px;
      font-size: clamp(15px, 3vw, 21px);
      color: rgba(255,255,255,.82);
      text-align: center;
      line-height: 1.8;
    }
    .badge {
      margin-top: 24px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(0,229,255,.12);
      border: 1px solid rgba(0,229,255,.28);
      color: #dffbff;
      font-size: 14px;
      letter-spacing: .08em;
    }
    .tap-heart {
      position: fixed;
      left: 0;
      top: 0;
      pointer-events: none;
      font-size: 24px;
      transform: translate(-50%, -50%);
      animation: pop 880ms ease-out forwards;
      text-shadow: 0 0 12px rgba(255,80,140,.8);
      z-index: 10;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes breathe {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.035); filter: brightness(1.22); }
    }
    @keyframes pop {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(.6); }
      100% { opacity: 0; transform: translate(-50%, -170%) scale(1.45); }
    }
    @media (max-width: 640px) {
      .card { width: 92vw; min-height: 520px; border-radius: 26px; }
      canvas { width: 86vw; height: 86vw; }
      .title { margin-top: -16px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .aurora, .title { animation: none; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="aurora"></div>
    <div class="grid"></div>
    <section class="card">
      <canvas id="heart" width="520" height="520" aria-label="流畅霓虹爱心动画"></canvas>
      <h1 class="title">心动代码</h1>
      <p class="subtitle">低卡顿流畅版 · 霓虹粒子 · 心跳光效<br />点击屏幕，会有小爱心冒出来</p>
      <div class="badge">SMOOTH NEON HEART</div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('heart');
    const ctx = canvas.getContext('2d', { alpha: true });
    const DPR = Math.min(window.devicePixelRatio || 1, 1.6);
    const base = 520;
    canvas.width = base * DPR;
    canvas.height = base * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    const cx = base / 2;
    const cy = base / 2 + 8;
    const isMobile = matchMedia('(max-width: 640px)').matches;
    const count = isMobile ? 210 : 320;
    const particles = [];

    function heartPoint(t, scale) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
      return { x: cx + x * scale, y: cy - y * scale };
    }

    for (let i = 0; i < count; i++) {
      const t = Math.random() * Math.PI * 2;
      const edge = heartPoint(t, 13.2 + Math.random() * 1.8);
      particles.push({
        t,
        x: edge.x,
        y: edge.y,
        ox: edge.x,
        oy: edge.y,
        r: Math.random() * 1.7 + .8,
        phase: Math.random() * Math.PI * 2,
        speed: .55 + Math.random() * .75,
        hue: Math.random() < .55 ? 335 + Math.random() * 28 : 185 + Math.random() * 25,
        layer: .55 + Math.random() * .65
      });
    }

    let last = 0;
    function draw(now) {
      const time = now * 0.001;
      const dt = Math.min(32, now - last || 16);
      last = now;
      ctx.clearRect(0, 0, base, base);

      const pulse = 1 + Math.sin(time * 2.8) * 0.035;
      const glow = ctx.createRadialGradient(cx, cy, 20, cx, cy, 230);
      glow.addColorStop(0, 'rgba(255, 54, 139, .18)');
      glow.addColorStop(.48, 'rgba(0, 229, 255, .07)');
      glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, 230, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(pulse, pulse);
      ctx.translate(-cx, -cy);

      ctx.globalCompositeOperation = 'lighter';
      for (const p of particles) {
        const orbit = Math.sin(time * p.speed + p.phase) * 4.6 * p.layer;
        const side = Math.cos(time * .7 + p.phase) * 2.2;
        const x = p.ox + Math.cos(p.t) * orbit + side;
        const y = p.oy + Math.sin(p.t) * orbit;
        const alpha = .45 + .38 * Math.sin(time * 1.7 + p.phase) ** 2;
        ctx.fillStyle = `hsla(${p.hue}, 100%, 66%, ${alpha})`;
        ctx.beginPath();
        ctx.arc(x, y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.lineWidth = 2.2;
      ctx.strokeStyle = 'rgba(255, 88, 160, .72)';
      ctx.shadowColor = 'rgba(255, 40, 145, .9)';
      ctx.shadowBlur = 14;
      ctx.beginPath();
      for (let i = 0; i <= 220; i++) {
        const pt = heartPoint(i / 220 * Math.PI * 2, 13.35);
        if (i === 0) ctx.moveTo(pt.x, pt.y); else ctx.lineTo(pt.x, pt.y);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.restore();

      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    let lastTap = 0;
    window.addEventListener('pointerdown', (e) => {
      const now = Date.now();
      if (now - lastTap < 120) return;
      lastTap = now;
      const el = document.createElement('div');
      el.className = 'tap-heart';
      el.textContent = Math.random() > .5 ? '💗' : '💖';
      el.style.left = e.clientX + 'px';
      el.style.top = e.clientY + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }, { passive: true });
  </script>
</body>
</html>
