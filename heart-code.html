<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>爱心代码</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 30%, #33142a 0%, #120718 45%, #050208 100%);
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .text {
      position: fixed;
      left: 50%;
      top: 72%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,.92);
      text-align: center;
      letter-spacing: 2px;
      text-shadow: 0 0 18px rgba(255, 75, 132, .9);
      user-select: none;
      pointer-events: none;
    }
    .text h1 {
      font-size: clamp(34px, 5vw, 68px);
      margin-bottom: 14px;
      font-weight: 800;
    }
    .text p {
      font-size: clamp(15px, 2vw, 24px);
      opacity: .86;
    }
    .tips {
      position: fixed;
      right: 18px;
      bottom: 16px;
      color: rgba(255,255,255,.45);
      font-size: 13px;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="text">
    <h1>❤ 心动代码 ❤</h1>
    <p>愿每一次努力，都被温柔以待</p>
  </div>
  <div class="tips">可最小化浏览器后台运行</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let w, h, particles = [];

    function resize() {
      w = canvas.width = window.innerWidth * devicePixelRatio;
      h = canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    function heartPoint(t, scale) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
      return { x: x * scale, y: y * scale };
    }

    class Particle {
      constructor() { this.reset(true); }
      reset(randomStart = false) {
        const scale = Math.min(window.innerWidth, window.innerHeight) / 38;
        const t = Math.random() * Math.PI * 2;
        const p = heartPoint(t, scale);
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2 - 55;
        this.baseX = cx + p.x;
        this.baseY = cy + p.y;
        this.x = randomStart ? Math.random() * window.innerWidth : this.baseX;
        this.y = randomStart ? Math.random() * window.innerHeight : this.baseY;
        this.vx = 0;
        this.vy = 0;
        this.size = Math.random() * 2.4 + 1.1;
        this.alpha = Math.random() * .45 + .55;
        this.color = Math.random() > .55 ? '#ff4f8b' : (Math.random() > .5 ? '#ff90b8' : '#ffd1df');
        this.float = Math.random() * Math.PI * 2;
        this.speed = Math.random() * .015 + .008;
      }
      update(time) {
        const pulse = 1 + Math.sin(time * 0.003) * 0.045;
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2 - 55;
        const tx = cx + (this.baseX - cx) * pulse + Math.sin(this.float + time * this.speed) * 4;
        const ty = cy + (this.baseY - cy) * pulse + Math.cos(this.float + time * this.speed) * 4;
        this.vx += (tx - this.x) * 0.018;
        this.vy += (ty - this.y) * 0.018;
        this.vx *= 0.84;
        this.vy *= 0.84;
        this.x += this.vx;
        this.y += this.vy;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.shadowBlur = 16;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function init() {
      const count = Math.floor(Math.min(980, Math.max(460, window.innerWidth * window.innerHeight / 1850)));
      particles = Array.from({ length: count }, () => new Particle());
    }
    init();
    window.addEventListener('resize', init);

    function drawHeartLine(time) {
      const scale = Math.min(window.innerWidth, window.innerHeight) / 38;
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2 - 55;
      const pulse = 1 + Math.sin(time * 0.003) * 0.045;
      ctx.save();
      ctx.strokeStyle = 'rgba(255, 120, 165, .38)';
      ctx.lineWidth = 2;
      ctx.shadowBlur = 22;
      ctx.shadowColor = '#ff4f8b';
      ctx.beginPath();
      for (let i = 0; i <= 360; i++) {
        const t = i / 360 * Math.PI * 2;
        const p = heartPoint(t, scale * pulse);
        const x = cx + p.x;
        const y = cy + p.y;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    function animate(time) {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      const grad = ctx.createRadialGradient(window.innerWidth/2, window.innerHeight/2, 40, window.innerWidth/2, window.innerHeight/2, window.innerWidth*.65);
      grad.addColorStop(0, 'rgba(255, 75, 132, .16)');
      grad.addColorStop(1, 'rgba(255, 75, 132, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      drawHeartLine(time);
      particles.forEach(p => { p.update(time); p.draw(); });
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
