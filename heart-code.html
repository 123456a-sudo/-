<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>心海流光 · 动态爱心</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: #fff;
      background: #050611;
      cursor: pointer;
    }
    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 44%, rgba(255, 44, 145, .20), transparent 28%),
        radial-gradient(circle at 18% 80%, rgba(0, 211, 255, .17), transparent 32%),
        radial-gradient(circle at 82% 18%, rgba(149, 86, 255, .20), transparent 30%),
        linear-gradient(180deg, #050611 0%, #071329 50%, #090617 100%);
    }
    .scene::before {
      content: "";
      position: absolute;
      inset: -20%;
      background: conic-gradient(from 180deg, rgba(255,45,149,.12), rgba(0,229,255,.16), rgba(120,92,255,.12), rgba(255,45,149,.12));
      filter: blur(58px);
      animation: rotate 22s linear infinite;
    }
    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(circle at center, rgba(0,0,0,.9), transparent 72%);
      opacity: .8;
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }
    .copy {
      position: relative;
      z-index: 2;
      pointer-events: none;
      text-align: center;
      margin-top: min(58vh, 460px);
      padding: 0 20px;
    }
    h1 {
      font-size: clamp(34px, 7vw, 68px);
      font-weight: 900;
      letter-spacing: .10em;
      text-shadow: 0 0 16px rgba(255,55,155,.88), 0 0 38px rgba(0,229,255,.50);
      animation: pulseText 2.4s ease-in-out infinite;
    }
    p {
      margin-top: 14px;
      font-size: clamp(15px, 3vw, 22px);
      color: rgba(230,248,255,.88);
      line-height: 1.8;
      text-shadow: 0 0 14px rgba(0,0,0,.7);
    }
    .tips {
      margin-top: 18px;
      display: inline-flex;
      padding: 9px 16px;
      border-radius: 999px;
      border: 1px solid rgba(0,229,255,.34);
      background: rgba(3, 22, 42, .38);
      color: #dffbff;
      font-size: 13px;
      letter-spacing: .08em;
      backdrop-filter: blur(8px);
    }
    .tap-heart {
      position: fixed;
      left: 0;
      top: 0;
      pointer-events: none;
      font-size: 22px;
      transform: translate(-50%, -50%);
      animation: pop 900ms ease-out forwards;
      z-index: 8;
      filter: drop-shadow(0 0 10px rgba(255,60,150,.9));
    }
    @keyframes rotate { to { transform: rotate(360deg); } }
    @keyframes pulseText { 0%,100% { transform: scale(1); } 50% { transform: scale(1.035); } }
    @keyframes pop { from { opacity: 1; transform: translate(-50%, -50%) scale(.6); } to { opacity: 0; transform: translate(-50%, -180%) scale(1.55); } }
  </style>
</head>
<body>
  <main class="scene">
    <canvas id="canvas"></canvas>
    <section class="copy">
      <h1>心海流光</h1>
      <p>动态爱心 · 流光海浪 · 心跳光环<br />愿每一次闪烁，都是心动的形状</p>
      <div class="tips">点击屏幕，会泛起爱心光点</div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: true });
    let W = 0, H = 0, DPR = 1, cx = 0, cy = 0, scale = 1;
    const isMobile = matchMedia('(max-width: 640px)').matches;
    const streamCount = isMobile ? 190 : 300;
    const waveCount = isMobile ? 32 : 46;
    const sparkCount = isMobile ? 70 : 110;
    const streams = [];
    const waves = [];
    const sparks = [];
    const bursts = [];

    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 1.7);
      W = innerWidth;
      H = innerHeight;
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      cx = W / 2;
      cy = H * 0.43;
      scale = Math.min(W, H) / 36;
    }

    function heart(t, s = scale) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
      return { x: cx + x * s, y: cy - y * s };
    }

    function reset() {
      streams.length = waves.length = sparks.length = 0;
      for (let i = 0; i < streamCount; i++) {
        streams.push({
          t: Math.random() * Math.PI * 2,
          speed: .0025 + Math.random() * .0048,
          len: .18 + Math.random() * .32,
          offset: Math.random() * Math.PI * 2,
          hue: Math.random() < .55 ? 330 + Math.random() * 34 : 185 + Math.random() * 34,
          width: .8 + Math.random() * 1.8,
          alpha: .28 + Math.random() * .52,
        });
      }
      for (let i = 0; i < waveCount; i++) {
        waves.push({
          y: H * (.52 + Math.random() * .32),
          amp: 10 + Math.random() * 30,
          speed: .25 + Math.random() * .55,
          phase: Math.random() * Math.PI * 2,
          hue: Math.random() < .5 ? 195 : 318,
          alpha: .05 + Math.random() * .10,
        });
      }
      for (let i = 0; i < sparkCount; i++) {
        sparks.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: .7 + Math.random() * 1.7,
          speed: .12 + Math.random() * .38,
          phase: Math.random() * Math.PI * 2,
          hue: Math.random() < .5 ? 190 : 330,
        });
      }
    }

    resize(); reset();
    addEventListener('resize', () => { resize(); reset(); }, { passive: true });

    function drawHeartCore(time) {
      const pulse = 1 + Math.sin(time * 2.6) * .045;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(pulse, pulse);
      ctx.translate(-cx, -cy);

      const grad = ctx.createRadialGradient(cx, cy, 10, cx, cy, scale * 16.5);
      grad.addColorStop(0, 'rgba(255,255,255,.22)');
      grad.addColorStop(.30, 'rgba(255,55,155,.16)');
      grad.addColorStop(.70, 'rgba(0,229,255,.08)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, scale * 18, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalCompositeOperation = 'lighter';
      for (let k = 0; k < 3; k++) {
        ctx.beginPath();
        for (let i = 0; i <= 260; i++) {
          const p = heart(i / 260 * Math.PI * 2, scale * (1 + k * .035));
          if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
        }
        ctx.closePath();
        ctx.lineWidth = 1.8 + k * 2.1;
        ctx.strokeStyle = k === 0 ? 'rgba(255,245,255,.78)' : k === 1 ? 'rgba(255,54,155,.36)' : 'rgba(0,229,255,.22)';
        ctx.shadowColor = k === 0 ? '#ff45a4' : '#00e5ff';
        ctx.shadowBlur = 12 + k * 10;
        ctx.stroke();
      }
      ctx.restore();
      ctx.globalCompositeOperation = 'source-over';
    }

    function drawStreams(time) {
      ctx.globalCompositeOperation = 'lighter';
      for (const s of streams) {
        const t1 = (s.t + time * s.speed * 60) % (Math.PI * 2);
        const t2 = t1 - s.len;
        const p1 = heart(t1, scale * (1 + Math.sin(time + s.offset) * .018));
        const p2 = heart(t2, scale * (1 + Math.sin(time + s.offset) * .018));
        const g = ctx.createLinearGradient(p2.x, p2.y, p1.x, p1.y);
        g.addColorStop(0, `hsla(${s.hue}, 100%, 65%, 0)`);
        g.addColorStop(.45, `hsla(${s.hue}, 100%, 68%, ${s.alpha * .45})`);
        g.addColorStop(1, `hsla(${s.hue + 25}, 100%, 78%, ${s.alpha})`);
        ctx.strokeStyle = g;
        ctx.lineWidth = s.width;
        ctx.shadowColor = `hsl(${s.hue}, 100%, 65%)`;
        ctx.shadowBlur = 9;
        ctx.beginPath();
        ctx.moveTo(p2.x, p2.y);
        const mid = heart((t1 + t2) / 2, scale * 1.02);
        ctx.quadraticCurveTo(mid.x, mid.y, p1.x, p1.y);
        ctx.stroke();
      }
      ctx.globalCompositeOperation = 'source-over';
    }

    function drawSea(time) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (const w of waves) {
        ctx.beginPath();
        const yBase = w.y + Math.sin(time * w.speed + w.phase) * 18;
        for (let x = -20; x <= W + 20; x += 18) {
          const y = yBase + Math.sin(x * .012 + time * w.speed * 2.2 + w.phase) * w.amp + Math.sin(x * .025 - time * .8) * 5;
          if (x === -20) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = `hsla(${w.hue}, 100%, 65%, ${w.alpha})`;
        ctx.lineWidth = 1.2;
        ctx.shadowColor = `hsl(${w.hue}, 100%, 62%)`;
        ctx.shadowBlur = 10;
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawSparks(time) {
      ctx.globalCompositeOperation = 'lighter';
      for (const sp of sparks) {
        sp.y -= sp.speed;
        if (sp.y < -10) { sp.y = H + 10; sp.x = Math.random() * W; }
        const tw = .35 + .45 * Math.sin(time * 2 + sp.phase) ** 2;
        ctx.fillStyle = `hsla(${sp.hue}, 100%, 72%, ${tw})`;
        ctx.beginPath();
        ctx.arc(sp.x + Math.sin(time + sp.phase) * 10, sp.y, sp.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalCompositeOperation = 'source-over';
    }

    function drawBursts() {
      ctx.globalCompositeOperation = 'lighter';
      for (let i = bursts.length - 1; i >= 0; i--) {
        const b = bursts[i];
        b.life += .025;
        if (b.life >= 1) { bursts.splice(i, 1); continue; }
        const x = b.x + Math.cos(b.a) * b.life * b.dist;
        const y = b.y + Math.sin(b.a) * b.life * b.dist - b.life * 30;
        ctx.fillStyle = `hsla(${b.hue}, 100%, 70%, ${1 - b.life})`;
        ctx.font = `${b.size * (1 + b.life * .5)}px serif`;
        ctx.fillText('❤', x, y);
      }
      ctx.globalCompositeOperation = 'source-over';
    }

    let last = 0;
    function animate(now) {
      const time = now * .001;
      ctx.clearRect(0, 0, W, H);
      drawSea(time);
      drawSparks(time);
      drawHeartCore(time);
      drawStreams(time);
      drawBursts();
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    let lastTap = 0;
    addEventListener('pointerdown', (e) => {
      const now = Date.now();
      if (now - lastTap < 140) return;
      lastTap = now;
      const el = document.createElement('div');
      el.className = 'tap-heart';
      el.textContent = '💖';
      el.style.left = e.clientX + 'px';
      el.style.top = e.clientY + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 900);
      for (let i = 0; i < 12; i++) {
        bursts.push({
          x: e.clientX,
          y: e.clientY,
          a: Math.random() * Math.PI * 2,
          dist: 45 + Math.random() * 110,
          life: 0,
          size: 13 + Math.random() * 11,
          hue: Math.random() < .5 ? 330 + Math.random()*30 : 185 + Math.random()*30,
        });
      }
    }, { passive: true });
  </script>
</body>
</html>
