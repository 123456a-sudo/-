<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>极光心海</title><style>
*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%;overflow:hidden}body{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;color:#fff;background:#050612;cursor:pointer}.scene{position:relative;width:100vw;height:100vh;overflow:hidden;display:grid;place-items:center}canvas{position:absolute;inset:0;width:100vw;height:100vh;z-index:1}.copy{position:relative;z-index:3;text-align:center;pointer-events:none;padding:0 18px;margin-top:46vh}.copy h1{font-size:clamp(38px,8vw,82px);font-weight:900;letter-spacing:.09em;text-shadow:0 0 18px currentColor,0 0 42px rgba(255,255,255,.24)}.copy p{margin-top:14px;font-size:clamp(15px,3vw,23px);line-height:1.8;color:rgba(255,255,255,.84);text-shadow:0 0 14px rgba(0,0,0,.8)}.tag{margin-top:18px;display:inline-flex;padding:9px 16px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(8px);font-size:13px;letter-spacing:.08em}.tap{position:fixed;left:0;top:0;pointer-events:none;transform:translate(-50%,-50%);animation:pop .9s ease-out forwards;z-index:9;filter:drop-shadow(0 0 12px rgba(255,80,150,.9))}@keyframes pop{to{opacity:0;transform:translate(-50%,-170%) scale(1.55)}}
body{background:#030915}.copy h1{color:#d8fbff}</style></head><body><main class="scene"><canvas id="c"></canvas><section class="copy"><h1>极光心海</h1><p>爱心轨迹像流光在心形上游动，下面有心海波纹</p><div class="tag">STYLE 03 · AURORA SEA</div></section></main><script>
const canvas=document.getElementById('c');const ctx=canvas.getContext('2d',{alpha:true});let W,H,DPR,cx,cy,S;function resize(){DPR=Math.min(devicePixelRatio||1,1.7);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);cx=W/2;cy=H*.40;S=Math.min(W,H)/34}function heart(t,s=S){let x=16*Math.pow(Math.sin(t),3),y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);return{x:cx+x*s,y:cy-y*s}}resize();addEventListener('resize',resize,{passive:true});let lastTap=0;addEventListener('pointerdown',e=>{let n=Date.now();if(n-lastTap<130)return;lastTap=n;let el=document.createElement('div');el.className='tap';el.textContent=Math.random()>.5?'💖':'💗';el.style.left=e.clientX+'px';el.style.top=e.clientY+'px';el.style.fontSize=(22+Math.random()*12)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),900)},{passive:true});

const streams=Array.from({length:260},()=>({t:Math.random()*6.28,len:.10+Math.random()*.28,v:.003+Math.random()*.006,h:180+Math.random()*170,w:.8+Math.random()*2.2,a:.25+Math.random()*.5}));
function sea(time){ctx.globalCompositeOperation='lighter';for(let k=0;k<42;k++){let y=H*(.52+k*.011)+Math.sin(time*.5+k)*24;ctx.beginPath();for(let x=-20;x<W+30;x+=18){let yy=y+Math.sin(x*.013+time*1.6+k)*18+Math.sin(x*.028-time)*5;x==-20?ctx.moveTo(x,yy):ctx.lineTo(x,yy)}ctx.strokeStyle=k%2?'rgba(0,229,255,.085)':'rgba(255,80,190,.075)';ctx.lineWidth=1.2;ctx.shadowBlur=8;ctx.shadowColor=k%2?'#00e5ff':'#ff4ab4';ctx.stroke()}ctx.globalCompositeOperation='source-over'}
function draw(now){let time=now*.001;ctx.clearRect(0,0,W,H);let a=ctx.createConicGradient(time*.12,cx,cy);a.addColorStop(0,'rgba(0,229,255,.10)');a.addColorStop(.35,'rgba(255,60,180,.13)');a.addColorStop(.7,'rgba(110,90,255,.12)');a.addColorStop(1,'rgba(0,229,255,.10)');ctx.fillStyle=a;ctx.fillRect(0,0,W,H);sea(time);ctx.globalCompositeOperation='lighter';let pulse=1+Math.sin(time*2.7)*.04;for(const s0 of streams){let t1=(s0.t+time*s0.v*60)%6.28,t2=t1-s0.len;let p1=heart(t1,S*pulse),p2=heart(t2,S*pulse);let g=ctx.createLinearGradient(p2.x,p2.y,p1.x,p1.y);g.addColorStop(0,'hsla('+s0.h+',100%,60%,0)');g.addColorStop(.65,'hsla('+s0.h+',100%,68%,'+(s0.a*.55)+')');g.addColorStop(1,'hsla('+(s0.h+35)+',100%,78%,'+s0.a+')');ctx.strokeStyle=g;ctx.lineWidth=s0.w;ctx.shadowBlur=12;ctx.shadowColor='hsl('+s0.h+',100%,65%)';ctx.beginPath();ctx.moveTo(p2.x,p2.y);let m=heart((t1+t2)/2,S*pulse);ctx.quadraticCurveTo(m.x,m.y,p1.x,p1.y);ctx.stroke()}ctx.globalCompositeOperation='source-over';requestAnimationFrame(draw)}requestAnimationFrame(draw);
</script></body></html>
