<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>水晶星核</title><style>
*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%;overflow:hidden}body{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;background:#03040a;color:#fff;cursor:pointer}.scene{position:relative;width:100vw;height:100vh;overflow:hidden;display:grid;place-items:center;background:radial-gradient(circle at 50% 42%,rgba(120,245,255,.20),transparent 27%),radial-gradient(circle at 80% 15%,rgba(255,255,255,.12),transparent 24%),linear-gradient(180deg,#040811,#071833 55%,#080518)}.scene:before{content:"";position:absolute;inset:-25%;background:conic-gradient(from 90deg,rgba(125,245,255,.18),rgba(255,255,255,.13),rgba(170,110,255,.16),rgba(125,245,255,.18));filter:blur(70px);opacity:.82;animation:spin 18s linear infinite}.scene:after{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:54px 54px;mask-image:radial-gradient(circle at center,#000 0%,transparent 76%);opacity:.82}canvas{position:absolute;inset:0;width:100vw;height:100vh;z-index:1}.copy{position:relative;z-index:3;text-align:center;pointer-events:none;margin-top:48vh;padding:0 18px}.copy h1{font-size:clamp(38px,8vw,84px);font-weight:900;letter-spacing:.11em;color:#c9fbff;text-shadow:0 0 18px currentColor,0 0 54px rgba(120,245,255,.75);animation:breathe 2.4s ease-in-out infinite}.copy p{margin-top:14px;font-size:clamp(15px,3vw,23px);line-height:1.8;color:rgba(255,255,255,.86);text-shadow:0 0 16px rgba(0,0,0,.85)}.tag{margin-top:18px;display:inline-flex;padding:9px 16px;border-radius:999px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.24);backdrop-filter:blur(10px);font-size:13px;letter-spacing:.08em}.tap{position:fixed;left:0;top:0;pointer-events:none;transform:translate(-50%,-50%);animation:pop .9s ease-out forwards;z-index:9;filter:drop-shadow(0 0 12px rgba(120,245,255,.75))}@keyframes spin{to{transform:rotate(360deg)}}@keyframes breathe{50%{transform:scale(1.035);filter:brightness(1.22)}}@keyframes pop{to{opacity:0;transform:translate(-50%,-170%) scale(1.55)}}
</style></head><body><main class="scene"><canvas id="c"></canvas><section class="copy"><h1>水晶星核</h1><p>像水晶星核一样闪烁的动态爱心<br>点击屏幕，释放心动光点</p><div class="tag">CRYSTAL HEART</div></section></main><script>
const mode='crystal', canvas=document.getElementById('c'), ctx=canvas.getContext('2d',{alpha:true});let W,H,D,cx,cy,S;let pts=[],stars=[],rings=[],bursts=[];const mobile=matchMedia('(max-width:640px)').matches;
function resize(){D=Math.min(devicePixelRatio||1,1.65);W=innerWidth;H=innerHeight;canvas.width=W*D;canvas.height=H*D;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(D,0,0,D,0,0);cx=W/2;cy=H*.42;S=Math.min(W,H)/36;init()}addEventListener('resize',resize,{passive:true});
function heart(t,s=S){let x=16*Math.pow(Math.sin(t),3),y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);return{x:cx+x*s,y:cy-y*s}}
function init(){pts=[];stars=[];rings=[];let n=mobile?260:420;for(let i=0;i<n;i++){let t=Math.random()*Math.PI*2;let p=heart(t,S*(.88+Math.random()*.22));pts.push({t,x:p.x,y:p.y,r:.6+Math.random()*1.8,a:.35+Math.random()*.62,sp:.002+Math.random()*.006,h:185+Math.random()*75,ph:Math.random()*7});}for(let i=0;i<(mobile?90:150);i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:.5+Math.random()*1.8,h:205+Math.random()*80,sp:.08+Math.random()*.35,ph:Math.random()*7});for(let i=0;i<7;i++)rings.push({r:S*(9+i*1.4),a:i*.13});}
function drawCore(t){let pulse=1+Math.sin(t*2.7)*.045;ctx.save();ctx.translate(cx,cy);ctx.scale(pulse,pulse);ctx.translate(-cx,-cy);ctx.globalCompositeOperation='lighter';for(let k=0;k<4;k++){ctx.beginPath();for(let i=0;i<=260;i++){let p=heart(i/260*Math.PI*2,S*(1+k*.026+Math.sin(t*1.5+k)*.008));i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)}ctx.closePath();ctx.lineWidth=1.5+k*1.8;ctx.strokeStyle=k==0?'rgba(255,255,255,.74)':`hsla(${185+k*22},100%,68%,${.34-k*.05})`;ctx.shadowColor=`hsl(${185+k*25},100%,65%)`;ctx.shadowBlur=14+k*9;ctx.stroke()}ctx.restore();ctx.globalCompositeOperation='source-over'}
function drawPoints(t){ctx.globalCompositeOperation='lighter';for(const p of pts){let q=heart((p.t+t*p.sp*75)%(Math.PI*2),S*(.96+Math.sin(t+p.ph)*.035));let off=mode==='crystal'?Math.sin(t*3+p.ph)*7:mode==='matrix'?Math.sin(t*4+p.ph)*4:mode==='liquid'?Math.sin(t*2+p.ph)*11:Math.sin(t*2.5+p.ph)*6;ctx.fillStyle=`hsla(${p.h+Math.sin(t+p.ph)*30},100%,68%,${p.a})`;ctx.beginPath();ctx.arc(q.x+Math.cos(p.t)*off,q.y+Math.sin(p.t)*off,p.r,0,7);ctx.fill()}ctx.globalCompositeOperation='source-over'}
function drawBg(t){ctx.globalCompositeOperation='lighter';for(const s of stars){s.y-=s.sp;if(s.y<-10){s.y=H+10;s.x=Math.random()*W}ctx.fillStyle=`hsla(${s.h},100%,72%,${.25+.45*Math.sin(t*2+s.ph)**2})`;ctx.beginPath();ctx.arc(s.x+Math.sin(t+s.ph)*10,s.y,s.r,0,7);ctx.fill()}if(mode==='liquid'||mode==='crystal'){for(const r of rings){ctx.beginPath();for(let i=0;i<=240;i++){let a=i/240*Math.PI*2;let rr=r.r+Math.sin(a*5+t*2+r.a)*9;let x=cx+Math.cos(a)*rr*1.35,y=cy+Math.sin(a)*rr*.72; i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.closePath();ctx.strokeStyle=`hsla(${205},100%,65%,${.035+r.a*.08})`;ctx.lineWidth=1;ctx.stroke()}}if(mode==='matrix'){ctx.font='16px monospace';for(let i=0;i<44;i++){let x=(i*97+t*28)%W,y=(Math.sin(i*2.1+t)*.5+.5)*H;ctx.fillStyle='rgba(0,255,190,.16)';ctx.fillText(Math.random()>.5?'01':'AI',x,y)}}ctx.globalCompositeOperation='source-over'}
function drawBursts(){ctx.globalCompositeOperation='lighter';for(let i=bursts.length-1;i>=0;i--){let b=bursts[i];b.life+=.025;if(b.life>=1){bursts.splice(i,1);continue}let x=b.x+Math.cos(b.a)*b.life*b.d,y=b.y+Math.sin(b.a)*b.life*b.d-b.life*35;ctx.fillStyle=`hsla(${b.h},100%,70%,${1-b.life})`;ctx.font=`${b.s*(1+b.life*.5)}px serif`;ctx.fillText('❤',x,y)}ctx.globalCompositeOperation='source-over'}
function loop(ms){let t=ms*.001;ctx.clearRect(0,0,W,H);drawBg(t);drawCore(t);drawPoints(t);drawBursts();requestAnimationFrame(loop)}
let last=0;addEventListener('pointerdown',e=>{let n=Date.now();if(n-last<120)return;last=n;let el=document.createElement('div');el.className='tap';el.textContent='💖';el.style.left=e.clientX+'px';el.style.top=e.clientY+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),900);for(let i=0;i<14;i++)bursts.push({x:e.clientX,y:e.clientY,a:Math.random()*7,d:45+Math.random()*120,life:0,s:13+Math.random()*12,h:185+Math.random()*80})},{passive:true});resize();requestAnimationFrame(loop);
</script></body></html>
